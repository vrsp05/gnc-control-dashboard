<!DOCTYPE html>
<html>
<head>
    <title>SCADA Dashboard</title>
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .panel { border: 2px solid #00ff00; padding: 20px; border-radius: 10px; display: inline-block; }
        h1 { border-bottom: 1px solid #00ff00; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>{{ unit_name }}</h1>
        <p>Status: <strong>{{ system_status }}</strong></p>
        <p>Telemetry: Active</p>
    </div>
</body>
</html>
